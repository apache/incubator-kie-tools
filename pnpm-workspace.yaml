packages:
  - "packages/*"
  - "examples/*"
  - "scripts/*"
overrides:
  # GHSA-h67p-54hq-rp68: js-yaml 3.x prototype-pollution/ReDoS — upgrade transitive consumers to patched 3.15.0
  "@apidevtools/json-schema-ref-parser>js-yaml": "^3.15.0"
  "@istanbuljs/load-nyc-config>js-yaml": "^3.15.0"
  "cross-spawn": "^7.0.6"
  "d3-color": "3.1.0"
  "graphql": "14.3.1"
  "json-refs>js-yaml": "^3.15.0"
  # CVE-2026-33750: Fix security vulnerability in brace-expansion
  # Overriding transitive dependency until minimatch updates to patched brace-expansion version
  "minimatch@^3>brace-expansion": "1.1.13"
  "minimatch@^5>brace-expansion": "^2.0.3"
  "openapi-types": "7.2.3"
  # CVE-2026-8723: Fix TypeError in qs.stringify (comma arrayFormat + encodeValuesOnly with null/undefined)
  # Overriding transitive dependency until @cypress/request updates to patched qs version
  "@cypress/request@3>qs": "6.15.2"
  "path-to-regexp@^0": "0.1.13"
  "react-dropzone": "^11.4.2"
  "superagent": "10.2.2"
  "xmlbuilder2>js-yaml": "^3.15.0"
  # GHSA-h67p-54hq-rp68: Fix ReDoS / prototype-pollution vulnerability in js-yaml
  # Upgrade all consumers of js-yaml@^4 to the patched 4.2.0 release
  "js-yaml@^4": "^4.2.0"
  "minimatch@^3": "3.1.5"
  "minimatch@^9": "9.0.8"
  "minimatch@^10": "10.2.1"
  "minimatch@^5": "5.1.9"
  "minimatch@^4": "5.1.9"
  # CVE-2026-1526, CVE-2026-2229, CVE-2026-1528, CVE-2026-1527, CVE-2026-1525, CVE-2026-2203, CVE-2026-12151, CVE-2026-9679, CVE-2026-11525, CVE-2026-6733: Fix security vulnerability in undici
  # Waiting for @openapi-contrib/openapi-schema-to-json-schema to release patched version
  "undici": "^6.27.0"
  # CVE-2026-41907: Fix security vulnerability in uuid
  # Transitive dependencies (node-notifier@8.0.2, jest-junit@16.0.0) still use uuid@8.3.2
  "uuid": "^11.1.1"
  # CVE-2026-33671 (High) / CVE-2026-33672 (Medium): picomatch POSIX bracket method injection and ReDoS.
  "picomatch@3": "3.0.2"
  "picomatch@4": "4.0.4"
