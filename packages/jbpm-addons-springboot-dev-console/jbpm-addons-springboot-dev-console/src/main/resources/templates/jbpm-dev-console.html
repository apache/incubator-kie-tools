<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jBPM Dev Console</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
      }
      #envelope-app {
        height: 100%;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <noscript>Enabling JavaScript is required to run this app.</noscript>
    <div id="envelope-app"></div>
    <script src="resources/webapp/standalone.js"></script>
    <script th:inline="javascript">
      const users = /*[[${users}]]*/ [];
      const appOrigin = /*[[${appOrigin}]]*/ "http://localhost:8080";
      const appRootPath = /*[[${appRootPath}]]*/ "";
      const dataIndexUrl = /*[[${dataIndexUrl}]]*/ "http://localhost:8080/graphql";

      RuntimeToolsDevUI.open({
        container: document.getElementById("envelope-app"),
        isDataIndexAvailable: true,
        users: users,
        dataIndexUrl: dataIndexUrl,
        quarkusAppOrigin: appOrigin,
        quarkusAppRootPath: appRootPath,
        shouldReplaceQuarkusAppOriginWithWebappOrigin: true,
        page: "Processes",
        devUIUrl: window.location.origin,
        devUIOrigin: window.location.origin,
        availablePages: ["Processes", "Jobs", "Tasks", "Forms"],
      });
    </script>
  </body>
</html>
